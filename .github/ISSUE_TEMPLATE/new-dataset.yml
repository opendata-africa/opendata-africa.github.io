name: Submit New Dataset
description: Propose a new dataset for the Open Data Africa portal.
title: "[New Dataset]: "
labels: ["new-dataset"]
body:
  - type: input
    id: dataset_id
    attributes:
      label: Dataset ID
      description: A unique ID like DS004
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Dataset Title
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Climate
        - Health
        - Economics
        - Agriculture
        - Education
        - Technology
        - Other
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License
    validations:
      required: true
  - type: input
    id: data_url
    attributes:
      label: Data URL
    validations:
      required: true
  - type: input
    id: authors
    attributes:
      label: Authors
    validations:
      required: true
